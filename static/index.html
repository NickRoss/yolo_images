<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXIF Location Tagger</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>EXIF Location Tagger</h1>
        <div class="health-indicators">
            <span id="health-immich" class="health-dot unknown" title="Immich">Immich</span>
            <span id="health-exiftool" class="health-dot unknown" title="Exiftool">Exiftool</span>
        </div>
    </header>

    <div class="controls">
        <div class="location-panel">
            <div class="search-group">
                <label>Search location</label>
                <div class="search-wrapper">
                    <input type="text" id="location-search" placeholder="Type to search..." autocomplete="off">
                    <div id="search-results" class="dropdown hidden"></div>
                </div>
            </div>

            <div class="saved-group">
                <label>Saved locations</label>
                <div class="saved-wrapper">
                    <select id="saved-locations">
                        <option value="">— select —</option>
                    </select>
                    <button id="btn-delete-saved" title="Remove selected saved location">&times;</button>
                </div>
            </div>

            <div class="coords-group">
                <label>Lat</label>
                <input type="number" id="lat" step="any" placeholder="0.0">
                <label>Lon</label>
                <input type="number" id="lon" step="any" placeholder="0.0">
            </div>

            <div class="save-group">
                <input type="text" id="save-name" placeholder="Save as...">
                <button id="btn-save-location">Save</button>
            </div>

            <div class="action-group">
                <button id="btn-apply" disabled>Apply to 0 selected</button>
                <button id="btn-delete" disabled>Delete 0 selected</button>
            </div>
        </div>

        <div class="selection-bar">
            <button id="btn-select-all">Select all</button>
            <button id="btn-deselect-all">Deselect all</button>
            <span id="status-text"></span>
        </div>
    </div>

    <div id="grid" class="grid"></div>

    <div class="pagination">
        <button id="btn-prev" disabled>&larr; Previous</button>
        <span id="page-info">Page 1</span>
        <button id="btn-next">Next &rarr;</button>
    </div>

    <div id="progress-overlay" class="progress-overlay hidden">
        <div class="progress-box">
            <div class="spinner"></div>
            <div id="progress-text">Processing...</div>
            <div class="progress-bar-track"><div id="progress-bar" class="progress-bar-fill"></div></div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/app.js"></script>
</body>
</html>
